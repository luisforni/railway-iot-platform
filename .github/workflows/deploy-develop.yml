name: Deploy — Develop

on:
  push:
    branches: [develop]

jobs:
  deploy:
    name: Deploy to develop
    runs-on: self-hosted
    environment: develop

    steps:
      - name: Pull latest code
        run: |
          cd /home/lf/git/railway-iot-platform
          git pull origin develop
          git submodule update --init --recursive

      - name: Write .env
        working-directory: /home/lf/git/railway-iot-platform/railway-iot-infra
        run: |
          cat > .env << 'EOF'
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          DEBUG=True
          ALLOWED_HOSTS=localhost,127.0.0.1
          MQTT_HOST=mqtt
          MQTT_PORT=1883
          MQTT_TOPIC=rail/#
          REDIS_URL=redis://:${{ secrets.REDIS_PASSWORD }}@redis:6379/0
          DB_NAME=railway_db
          DB_USER=railway
          DB_HOST=db
          DB_PORT=5432
          NEXT_PUBLIC_API_URL=http://localhost:8003
          NEXT_PUBLIC_WS_URL=ws://localhost:8003
          EOF

      - name: Build and restart
        working-directory: /home/lf/git/railway-iot-platform/railway-iot-infra
        run: |
          docker compose build
          docker compose up -d
          docker compose --profile simulator up -d simulator

      - name: Health check
        run: |
          sleep 15
          curl -f http://localhost:8003/api/v1/alerts/ || exit 1
          echo "Deploy develop OK"
